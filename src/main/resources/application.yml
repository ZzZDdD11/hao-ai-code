spring:
  application:
  name: hao-ai-code
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hao-ai-code
    username: root
    password: 12345678
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 5000ms
      ttl: 86400  # 聊天历史 TTL: 24小时（秒）
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms
  session:
    store-type: redis
    timeout: 2592000
server:
  port: 8123
  servlet:
    context-path: /api
  reactive:
    session:
      cookie:
        max-age: 2592000

knife4j:
  basic:
    enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
      strict-json-schema: true
      response-format: json_object
    reasoning-streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
      strict-json-schema: true
      temperature: 0.1
      response-format: json_object
      timeout-seconds: 180  # Tool调用需要更长超时时间
    routing-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192

# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: https://hao1-1348297834.cos.ap-beijing.myqcloud.com
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ap-beijing
    bucket: hao1-1348297834
# 配置actuator的监控端点，默认只暴露健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true  # 保持 Redis 健康检查开启
